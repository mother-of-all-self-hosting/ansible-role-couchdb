---

- name: Fail if required CouchDB settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) for using this role.
  when: "vars[item] == ''"
  with_items:
    - couchdb_admin_user
    - couchdb_admin_passwd
    - couchdb_admins
    - couchdb_version
    - couchdb_identifier
